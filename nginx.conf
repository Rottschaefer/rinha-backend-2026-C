

./api_main

pid ./nginx.pid;
error_log ./error.log;




events {
    worker_connections 1024;
}

http {
    upstream rinha_api {
        server 127.0.0.1:3000;
        server 127.0.0.1:3001;
    }

    server {
        listen 9999; # A porta exposta exigida pelo teste

        location / {
            proxy_pass http://rinha_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
