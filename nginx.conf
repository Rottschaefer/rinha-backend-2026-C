events {
    worker_connections 1024;
}

http {
    upstream rinha_api {
        # Round-robin é o comportamento padrão do Nginx
        server api01:9999;
        server api02:9999;
    }

    server {
        listen 9999; # A porta exposta exigida pelo teste

        location / {
            proxy_pass http://rinha_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
